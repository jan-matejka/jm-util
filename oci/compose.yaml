services:
  dev-base:
    build:
      dockerfile: wip/oci/Containerfile
      context: ../

  dev:
    image: ${COMPOSE_PROJECT_NAME}_dev-base
    volumes:
      - ./:/home/user/src:O
      - ../master:/home/user/master:O
      # Making these an overlay makes git work inside the container
      # while keeping the .git files intact on the host.
      #
      # Unfortunately it also means we lose the build artefacts and can not
      # modify the git history inside the container.
      # The git history doesn't matter because we can run release versionator
      # on the host (also bc git config user.name and email).
      # And then build packages even in container even with -d and get the
      # release package as long as there is no new commit and tree is not
      # dirty.
      #
      # FIXME: find a way to make this work with real ./.git.
      # Not just with this specific worktrees setup.
    x-podman.uidmaps:
      - +1000:@1000
    command: bash
    environment:
      DEB_SIGN_KEYID: ${DEB_SIGN_KEYID}
      NAME: ${NAME}
      DEBEMAIL: ${DEBEMAIL}
      DEBFULLNAME: ${DEBFULLNAME}
      DEBSIGN_KEYID: ${DEBSIGN_KEYID}
      DEBSIGN_MAINT: ${DEBSIGN_MAINT}

  debuild:
    extends:
      service: dev
    volumes:
      - ${HOME}/.gnupg/pubring.gpg:/home/user/.gnupg/pubring.gpg:ro
      - ${HOME}/.gnupg/pubring.kbx:/home/user/.gnupg/pubring.kbx:ro
      - ${HOME}/.gnupg/secring.gpg:/home/user/.gnupg/secring.gpg:ro
      - ${HOME}/.gnupg/private-keys-v1.d:/home/user/.gnupg/private-keys-v1.d:ro
      - ${HOME}/git/jm/debian-ppa/wip/dists/trixie/main/binary-amd64:/out
      # - /run/user/1000/gnupg/S.gpg-agent:/home/user/.gnupg/S.gpg-agent:Z
    environment:
      FIXUP_GIT_DIRS: 'true'
      # https://github.com/containers/podman-compose/issues/1022
    command: make version debuild cp-packages clean-changelog
